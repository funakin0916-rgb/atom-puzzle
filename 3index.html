/* ── サウンドエンジン ─── */
const SE = (() => {
let ctx = null;
const gc = () => {
if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
if (ctx.state === “suspended”) ctx.resume();
return ctx;
};
const p = fn => {
try {
fn(gc());
} catch (e) {}
};
const tone = (c, type, f1, f2, dur, vol = 0.12) => {
const o = c.createOscillator(),
g = c.createGain();
o.type = type;
o.frequency.setValueAtTime(f1, c.currentTime);
if (f2) o.frequency.exponentialRampToValueAtTime(f2, c.currentTime + dur * 0.6);
g.gain.setValueAtTime(vol, c.currentTime);
g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
o.connect(g).connect(c.destination);
o.start(c.currentTime);
o.stop(c.currentTime + dur);
};
return {
cardDraw: () => p(c => tone(c, “sine”, 800, 1200, 0.15, 0.15)),
cardSel: () => p(c => tone(c, “triangle”, 600, 900, 0.1, 0.1)),
cardDesel: () => p(c => tone(c, “triangle”, 700, 400, 0.1, 0.08)),
bond: pts => p(c => {
const t = c.currentTime;
const ns = pts >= 15 ? [523, 659, 784, 1047, 1319] : pts >= 9 ? [523, 659, 784, 1047] : pts >= 5 ? [523, 659, 784] : [523, 659];
ns.forEach((f, i) => {
const o = c.createOscillator(),
g = c.createGain();
o.type = pts >= 15 ? “square” : “sine”;
o.frequency.setValueAtTime(f, t + i * 0.12);
g.gain.setValueAtTime(0.12, t + i * 0.12);
g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.4);
o.connect(g).connect(c.destination);
o.start(t + i * 0.12);
o.stop(t + i * 0.12 + 0.4);
});
}),
pass: () => p(c => tone(c, “sine”, 400, 300, 0.25, 0.08)),
discard: () => p(c => tone(c, “sawtooth”, 300, 100, 0.2, 0.06)),
gStart: () => p(c => {
const t = c.currentTime;
[523, 659, 784, 1047].forEach((f, i) => {
const o = c.createOscillator(),
g = c.createGain();
o.type = “sine”;
o.frequency.setValueAtTime(f, t + i * 0.1);
g.gain.setValueAtTime(0.12, t + i * 0.1);
g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.3);
o.connect(g).connect(c.destination);
o.start(t + i * 0.1);
o.stop(t + i * 0.1 + 0.3);
});
}),
tap: () => p(c => tone(c, “sine”, 1000, null, 0.05, 0.05)),
victory: () => p(c => {
const t = c.currentTime;
[523, 523, 523, 698, 784, 698, 784, 1047].forEach((f, i) => {
const o = c.createOscillator(),
g = c.createGain();
o.type = i >= 6 ? “square” : “sine”;
o.frequency.setValueAtTime(f, t + i * 0.18);
g.gain.setValueAtTime(0.15, t + i * 0.18);
g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.18 + 0.5);
o.connect(g).connect(c.destination);
o.start(t + i * 0.18);
o.stop(t + i * 0.18 + 0.5);
});
}),
lose: () => p(c => {
const t = c.currentTime;
[392, 349, 330, 294, 262].forEach((f, i) => {
const o = c.createOscillator(),
g = c.createGain();
o.type = “sine”;
o.frequency.setValueAtTime(f, t + i * 0.3);
g.gain.setValueAtTime(0.1, t + i * 0.3);
g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.3 + 0.6);
o.connect(g).connect(c.destination);
o.start(t + i * 0.3);
o.stop(t + i * 0.3 + 0.6);
});
}),
drum: () => p(c => {
const t = c.currentTime;
for (let i = 0; i < 20; i++) {
const o = c.createOscillator(),
g = c.createGain();
o.type = “sawtooth”;
o.frequency.setValueAtTime(80 + i * 3, t + i * 0.06);
g.gain.setValueAtTime(0.03 + i * 0.005, t + i * 0.06);
g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.08);
o.connect(g).connect(c.destination);
o.start(t + i * 0.06);
o.stop(t + i * 0.06 + 0.08);
}
})
};
})();

/* ── BGMエンジン ─── */
const BGM = (() => {
let ctx = null,
playing = false,
nodes = [],
timer = null;
const mel = [[523, .3], [587, .3], [659, .3], [523, .3], [523, .3], [587, .3], [659, .3], [523, .3], [659, .3], [698, .3], [784, .6], [659, .3], [698, .3], [784, .6], [784, .15], [880, .15], [784, .15], [698, .15], [659, .3], [523, .3], [784, .15], [880, .15], [784, .15], [698, .15], [659, .3], [523, .3], [523, .3], [392, .3], [523, .6], [523, .3], [392, .3], [523, .6]];
const bas = [[262, .6], [262, .6], [262, .6], [262, .6], [330, .6], [349, .6], [392, 1.2], [349, .6], [330, .6], [262, .6], [262, .6], [349, .6], [330, .6], [262, .6], [262, .6], [262, .6], [196, .6], [262, 1.2], [262, .6], [196, .6], [262, 1.2]];
const loop = () => {
if (!playing) return;
try {
if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
if (ctx.state === “suspended”) ctx.resume();
const t = ctx.currentTime;
let off = 0;
mel.forEach(([f, d]) => {
const o = ctx.createOscillator(),
g = ctx.createGain();
o.type = “triangle”;
o.frequency.setValueAtTime(f, t + off);
g.gain.setValueAtTime(0.06, t + off);
g.gain.exponentialRampToValueAtTime(0.001, t + off + d * 0.95);
o.connect(g).connect(ctx.destination);
o.start(t + off);
o.stop(t + off + d);
nodes.push(o);
off += d;
});
const ld = off;
let bo = 0;
bas.forEach(([f, d]) => {
if (bo >= ld) return;
const o = ctx.createOscillator(),
g = ctx.createGain();
o.type = “sine”;
o.frequency.setValueAtTime(f, t + bo);
g.gain.setValueAtTime(0.04, t + bo);
g.gain.exponentialRampToValueAtTime(0.001, t + bo + d * 0.9);
o.connect(g).connect(ctx.destination);
o.start(t + bo);
o.stop(t + bo + d);
nodes.push(o);
bo += d;
});
timer = setTimeout(loop, ld * 1000 - 100);
} catch (e) {}
};
return {
start: () => {
if (playing) return;
playing = true;
loop();
},
stop: () => {
playing = false;
if (timer) clearTimeout(timer);
nodes.forEach(n => {
try {
n.stop();
} catch (e) {}
});
nodes = [];
},
on: () => playing
};
})();
