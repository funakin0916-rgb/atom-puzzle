<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>原子パズルゲーム - デバッグ</title>
<style>html,body,#root{margin:0;padding:0;height:100%;background:#0a0a1a}#root{min-height:100dvh}#err{color:#ff4444;font-size:14px;padding:20px;white-space:pre-wrap;word-break:break-all}</style>
</head>
<body>
<div id="root"></div>
<div id="err"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
window.onerror = function(msg, url, line, col, err) {
  document.getElementById("err").textContent = "ERROR: " + msg + "\nLine: " + line + "\nCol: " + col + "\n" + (err && err.stack ? err.stack : "");
};
</script>
<script src="game.js"></script>
<script>
try {
  var root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(window.__App));
} catch(e) {
  document.getElementById("err").textContent = "RENDER ERROR: " + e.message + "\n" + e.stack;
}
</script>
</body>
</html>
